type: Application
version: "1"
metadata:
  name: "ubuntu-base-vm"
spec:
  assets:
    - name: ubuntu_base_disk
      type: virtual_disk
      format: raw
      url: "https://storage.googleapis.com/demo-bucket-lfm/noble-server-cloudimg-amd64.img"
  resources:
    - type: virdomain
      name: "ubuntu-base-vm"
      spec:
        description: ubuntu base with podman
        cpu: 0
        memory: "4294967296" # 4 GB
        machine_type: "uefi"
        storage_devices:
          - name: disk1
            type: virtio_disk
            source: "ubuntu_base_disk"
            boot: 1
            capacity: 100000000000 # 100 GB
        network_devices:
          - name: eth0
            type: virtio
        tags:
          - template
        state: shutoff
        cloud_init_data:
          user_data: |
            #cloud-config
            package_update: true
            package_upgrade: true

            packages:
              - curl
              - wget
              - apt-transport-https
              - ca-certificates
              - qemu-guest-agent
              - podman

            chpasswd:
              list: |
                root:el!te$oftwar3
              expire: false

            # Create admin user
            users:
              - name: admin
                primary_group: admin
                plain_text_passwd: 'el!te$oftwar3'
                lock_passwd: false
                shell: /bin/bash
                sudo: ALL=(ALL) NOPASSWD:ALL
                ssh_import_id: ["gh:haljac"]
                groups: sudo, adm

            runcmd:
              # Enable qemu-guest-agent
              - systemctl enable qemu-guest-agent
              - systemctl start qemu-guest-agent
              - systemctl status qemu-guest-agent

            write_files:
              - path: /etc/containers/registries.conf
                permissions: '0644'
                content: |
                  unqualified-search-registries = ["docker.io", "gcr.io", "quay.io", "registry.access.redhat.com"]

            runcmd:
              # Enable podman
              - systemctl enable podman
              - systemctl start podman
              - systemctl status podman

          meta_data: |
            instance-id: ubuntu-template
            local-hostname: ubuntu-template
