machine:
  network:
    nameservers:
      - 192.168.1.1
    interfaces:
      - interface: eno1
        dhcp: false
        addresses:
          - 192.168.1.241/24
        routes:
          - network: 0.0.0.0/0
            gateway: 192.168.1.1
  # `node-role.kubernetes.io/worker` is what
  # kubernetes/apps/longhorn/helm-values.yaml's nodeSelector keys on to
  # keep every Longhorn DaemonSet / Deployment off the control planes
  # (ADR-0005, issue #122). Control planes carry
  # `node-role.kubernetes.io/control-plane` by default and are not
  # labelled here.
  nodeLabels:
    node-role.kubernetes.io/worker: ""
  install:
    disk: /dev/nvme0n1
    image: factory.talos.dev/installer/613e1592b2da41ae5e265e8789429f22e121aab91cb4deb6bc3c0b6262961245:v1.13.0
  kernel:
    modules:
      - name: iscsi_tcp
---
apiVersion: v1alpha1
kind: HostnameConfig
auto: off
hostname: worker-01
---
apiVersion: v1alpha1
kind: VolumeConfig
name: EPHEMERAL
provisioning:
  maxSize: 200GiB
---
apiVersion: v1alpha1
kind: UserVolumeConfig
name: longhorn
provisioning:
  diskSelector:
    match: system_disk
  minSize: 100GiB
filesystem:
  type: xfs
