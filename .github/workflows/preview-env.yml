# Reusable PR-driven preview-environment lifecycle.
#
# Project repos call this via `uses:` from a wrapper workflow that fires
# on `pull_request` (`opened`, `synchronize`, `closed`). The two jobs
# below switch on `github.event.action`:
#
#   - `up` (opened/synchronize): mirrors `just preview-up` — derives
#     `NS=pr-<repo>-<num>`, creates the namespace with the
#     `projects.jackhall.dev/enabled=true` label and the optional
#     `projects.jackhall.dev/ttl` expiry annotation, applies the
#     baseline kustomization, then hands off to the caller's
#     `deploy-command` with `NS` and `GAR_REPO` in the environment.
#     After deploy returns, discovers HTTPRoute hostnames in the
#     namespace, posts them to the PR, and emits the primary as a
#     workflow output.
#
#   - `down` (closed, both merge and close-without-merge): mirrors
#     `just preview-down` — `kubectl delete ns --wait=false
#     --ignore-not-found`. The hourly TTL reaper (kubernetes/apps/
#     preview-env-reaper) is the orphan backstop; this is the primary
#     teardown path.
#
# Auth shape:
#
#   - Cluster: jobs run on the in-cluster ARC pool, so kubectl uses
#     the runner Pod's mounted ServiceAccount token via in-cluster
#     config. The runner's SA must hold the namespace
#     create/get/label/annotate verb cluster-wide and full
#     apply/get/delete inside the `pr-*` namespaces it owns — RBAC
#     binding lives outside this workflow (alongside the ARC chart
#     values for the corresponding scale set).
#   - GAR: `google-github-actions/auth` exchanges the runner's OIDC
#     token for an access token via WIF, identical to
#     `ar-push-smoke.yml`. The token is written to a docker config so
#     the caller's `deploy-command` (skaffold, ko, crane, …) can
#     push without re-authenticating.
#
# Caller contract — the `deploy-command` runs with:
#   - `NS` — the sanitised namespace (`pr-<repo>-<num>`, DNS-1123).
#   - `GAR_REPO` — `vars.GCP_AR_REPO_URL` (image-path prefix).
#   - `GOOGLE_APPLICATION_CREDENTIALS` — exported by the auth step.
#   - `kubectl` on PATH, configured for in-cluster access.
#   - Docker credential helper wired for the GAR host.
name: PR preview environment

on:
  workflow_call:
    inputs:
      deploy-command:
        description: >-
          Shell command run after the namespace is ready. Receives
          NS and GAR_REPO in the environment; runs in a bash shell
          with `set -euo pipefail`.
        required: true
        type: string
      ttl:
        description: >-
          Lifetime annotation applied to the preview namespace; the
          TTL reaper deletes namespaces past their expiry. Format
          `<num><unit>` where unit is one of s/m/h/d.
        required: false
        type: string
        default: 24h
      runner-label:
        description: >-
          ARC scale-set label appended to `[self-hosted, linux]` to
          pick a pool (`raptgroup` or `brazostech`).
        required: false
        type: string
        default: raptgroup
    outputs:
      preview-url:
        description: >-
          The primary preview hostname (first HTTPRoute hostname
          discovered after deploy), with `https://` prefix. Empty on
          teardown runs and on deploys that produce no HTTPRoute.
        value: ${{ jobs.up.outputs.preview-url }}

permissions:
  contents: read
  pull-requests: write
  id-token: write

# One in-flight run per PR. A push on top of an in-flight `synchronize`
# cancels the prior deploy; a `closed` event is allowed to interrupt
# any in-flight `up` so the teardown wins.
concurrency:
  group: preview-env-${{ github.event.repository.full_name }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  up:
    if: github.event.action == 'opened' || github.event.action == 'synchronize'
    runs-on: [self-hosted, linux, "${{ inputs.runner-label }}"]
    outputs:
      preview-url: ${{ steps.urls.outputs.primary }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      # `pr-<repo>-<num>` — repo is the bare repository name (not
      # owner/name), matched against DNS-1123 by lowercasing and
      # squashing every non-[a-z0-9-] character into `-`. Truncate to
      # 63 chars and trim trailing `-` so the result is a valid
      # Kubernetes namespace name.
      - name: Derive namespace
        id: ns
        env:
          REPO_NAME: ${{ github.event.repository.name }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          raw="pr-${REPO_NAME}-${PR_NUMBER}"
          ns="$(printf '%s' "$raw" | tr '[:upper:]' '[:lower:]' | sed -e 's/[^a-z0-9-]/-/g' -e 's/--*/-/g')"
          if [ "${#ns}" -gt 63 ]; then
            ns="${ns:0:63}"
          fi
          ns="${ns%-}"
          echo "ns=$ns" >> "$GITHUB_OUTPUT"
          echo "NS=$ns" >> "$GITHUB_ENV"
          echo "namespace: $ns"

      - name: Authenticate to GCP (WIF)
        id: auth
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0
        with:
          workload_identity_provider: ${{ vars.GCP_ARC_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_ARC_PUSH_SA }}
          token_format: access_token

      # The ARC runner image is bare (`ghcr.io/actions/actions-runner`)
      # — no kubectl, no gcloud. Install kubectl as a single static
      # binary; same pattern as crane in ar-push-smoke.yml.
      - name: Install kubectl
        run: |
          set -euo pipefail
          version=v1.31.0
          curl -fsSL -o "${RUNNER_TEMP}/kubectl" \
            "https://dl.k8s.io/release/${version}/bin/linux/amd64/kubectl"
          install -m 0755 "${RUNNER_TEMP}/kubectl" "${RUNNER_TEMP}/kubectl-bin"
          echo "${RUNNER_TEMP}" >> "${GITHUB_PATH}"
          "${RUNNER_TEMP}/kubectl" version --client=true

      # Wire the GAR access token into a docker config so the caller's
      # deploy-command (skaffold, ko, crane, …) can push without
      # re-authenticating. Token-format `access_token` from the auth
      # step is short-lived (~1h); the deploy runs immediately after.
      - name: Configure docker auth for GAR
        env:
          AR_REPO_URL: ${{ vars.GCP_AR_REPO_URL }}
          ACCESS_TOKEN: ${{ steps.auth.outputs.access_token }}
        run: |
          set -euo pipefail
          host="${AR_REPO_URL%%/*}"
          mkdir -p "${HOME}/.docker"
          auth="$(printf 'oauth2accesstoken:%s' "${ACCESS_TOKEN}" | base64 -w0)"
          cat > "${HOME}/.docker/config.json" <<JSON
          {
            "auths": {
              "${host}": {
                "auth": "${auth}"
              }
            }
          }
          JSON

      # Mirror of `just preview-up`: create the namespace, label it so
      # the projects Gateway's namespaceSelector will accept routes,
      # set the TTL expiry annotation if provided, then apply the
      # baseline (ResourceQuota + LimitRange + CiliumNetworkPolicy).
      # The baseline ships in *this* repo at kubernetes/preview-env-
      # baseline; the caller already checked out their own repo at
      # $GITHUB_WORKSPACE on the first `checkout`, so the baseline
      # gets checked out into a subpath at the same ref as the
      # workflow itself (so the baseline matches the workflow shape).
      - name: Parse baseline ref
        id: baseline
        env:
          WORKFLOW_REF: ${{ github.workflow_ref }}
        run: |
          set -euo pipefail
          path="${WORKFLOW_REF%@*}"
          ref="${WORKFLOW_REF##*@}"
          repo="$(printf '%s' "$path" | cut -d/ -f1-2)"
          echo "repo=$repo" >> "$GITHUB_OUTPUT"
          echo "ref=$ref" >> "$GITHUB_OUTPUT"

      - name: Check out preview-env baseline
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: ${{ steps.baseline.outputs.repo }}
          ref: ${{ steps.baseline.outputs.ref }}
          path: .preview-env-baseline
          fetch-depth: 1

      - name: Bring up preview namespace
        env:
          TTL: ${{ inputs.ttl }}
        run: |
          set -euo pipefail

          kubectl create namespace "$NS" --dry-run=client -o yaml | kubectl apply -f -
          kubectl label namespace "$NS" projects.jackhall.dev/enabled=true --overwrite

          if [ -n "$TTL" ]; then
            num="${TTL%[smhd]}"
            unit="${TTL: -1}"
            case "$unit" in
              s) secs="$num" ;;
              m) secs="$(( num * 60 ))" ;;
              h) secs="$(( num * 3600 ))" ;;
              d) secs="$(( num * 86400 ))" ;;
              *) echo "preview-env: invalid ttl unit '$unit' (use s/m/h/d)" >&2; exit 2 ;;
            esac
            expiry="$(date -u -d "+${secs} seconds" +"%Y-%m-%dT%H:%M:%SZ")"
            kubectl annotate namespace "$NS" "projects.jackhall.dev/ttl=$expiry" --overwrite
          fi

          kubectl apply -k .preview-env-baseline/kubernetes/preview-env-baseline -n "$NS"

      - name: Run deploy command
        env:
          GAR_REPO: ${{ vars.GCP_AR_REPO_URL }}
        shell: bash
        run: |
          set -euo pipefail
          ${{ inputs.deploy-command }}

      # Discover HTTPRoute hostnames the deploy created in this
      # namespace. Empty result is non-fatal (deploys may produce
      # backend-only workloads with no public surface); the PR
      # comment then says so.
      - name: Discover preview URLs
        id: urls
        run: |
          set -euo pipefail
          hosts="$(kubectl get httproutes.gateway.networking.k8s.io \
            -n "$NS" \
            -o jsonpath='{range .items[*]}{range .spec.hostnames[*]}{@}{"\n"}{end}{end}' \
            2>/dev/null | sort -u | sed '/^$/d' || true)"
          primary=""
          if [ -n "$hosts" ]; then
            primary="https://$(printf '%s\n' "$hosts" | head -n1)"
          fi
          {
            echo "primary=$primary"
            echo "hosts<<EOF"
            printf '%s\n' "$hosts"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Comment on PR
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v8.0.0
        env:
          NS: ${{ steps.ns.outputs.ns }}
          HOSTS: ${{ steps.urls.outputs.hosts }}
        with:
          script: |
            const ns = process.env.NS;
            const hosts = (process.env.HOSTS || '').split('\n').filter(Boolean);
            const body = hosts.length
              ? `### Preview environment ready\n\nNamespace \`${ns}\`:\n\n${hosts.map(h => `- https://${h}`).join('\n')}`
              : `### Preview environment ready\n\nNamespace \`${ns}\` (no HTTPRoute hostnames discovered — backend-only deploy?).`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body,
            });

  down:
    if: github.event.action == 'closed'
    runs-on: [self-hosted, linux, "${{ inputs.runner-label }}"]
    steps:
      - name: Derive namespace
        id: ns
        env:
          REPO_NAME: ${{ github.event.repository.name }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          raw="pr-${REPO_NAME}-${PR_NUMBER}"
          ns="$(printf '%s' "$raw" | tr '[:upper:]' '[:lower:]' | sed -e 's/[^a-z0-9-]/-/g' -e 's/--*/-/g')"
          if [ "${#ns}" -gt 63 ]; then
            ns="${ns:0:63}"
          fi
          ns="${ns%-}"
          echo "ns=$ns" >> "$GITHUB_OUTPUT"
          echo "NS=$ns" >> "$GITHUB_ENV"

      - name: Install kubectl
        run: |
          set -euo pipefail
          version=v1.31.0
          curl -fsSL -o "${RUNNER_TEMP}/kubectl" \
            "https://dl.k8s.io/release/${version}/bin/linux/amd64/kubectl"
          install -m 0755 "${RUNNER_TEMP}/kubectl" "${RUNNER_TEMP}/kubectl-bin"
          echo "${RUNNER_TEMP}" >> "${GITHUB_PATH}"

      - name: Tear down preview namespace
        run: |
          set -euo pipefail
          kubectl delete namespace "$NS" --wait=false --ignore-not-found

      - name: Comment on PR
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v8.0.0
        env:
          NS: ${{ steps.ns.outputs.ns }}
        with:
          script: |
            const ns = process.env.NS;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: `### Preview environment torn down\n\nNamespace \`${ns}\` deleted.`,
            });
