name: Secrets scan

on:
  pull_request:

permissions:
  contents: read

concurrency:
  group: secrets-scan-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # Need the merge-base of the PR branch and its target so the diff
          # range below is resolvable; the default shallow clone doesn't
          # include base.sha.
          fetch-depth: 0

      - name: Install gitleaks
        run: |
          set -euo pipefail
          version=8.30.1
          tmp=$(mktemp -d)
          curl -fsSL "https://github.com/gitleaks/gitleaks/releases/download/v${version}/gitleaks_${version}_linux_x64.tar.gz" \
            | tar -xz -C "$tmp"
          sudo install -m 0755 "$tmp/gitleaks" /usr/local/bin/gitleaks
          gitleaks version

      - name: Scan PR diff
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          # Scan only the commits introduced by the PR. Full-history baseline
          # was established by the one-time audit in #84; this job is the
          # prevention layer for new commits.
          gitleaks git \
            --no-banner \
            --redact \
            --verbose \
            --exit-code 1 \
            --log-opts="${BASE_SHA}..${HEAD_SHA}" \
            .
