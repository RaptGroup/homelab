apiVersion: gateway.networking.k8s.io/v1
kind: GatewayClass
metadata:
  name: eg
  namespace: envoy-gateway-system
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  controllerName: gateway.envoyproxy.io/gatewayclass-controller
---
# Certificate for Gateway HTTPS listener
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: gateway-tls-cert
  namespace: envoy-gateway-system
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  secretName: gateway-tls-secret
  issuerRef:
    name: selfsigned-app-issuer
    kind: ClusterIssuer
    group: cert-manager.io
  dnsNames:
    - gateway.homelab.internal
    - "*.homelab.internal"
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: eg
  namespace: envoy-gateway-system
  annotations:
    argocd.argoproj.io/sync-wave: "4"
spec:
  gatewayClassName: eg
  listeners:
    - name: http
      protocol: HTTP
      port: 80
      allowedRoutes:
        namespaces:
          from: All # <-- Allow HTTPRoutes from all namespaces
    - name: https
      protocol: HTTPS
      port: 443
      allowedRoutes:
        namespaces:
          from: All # <-- Allow HTTPRoutes from all namespaces
      tls:
        mode: Terminate
        certificateRefs:
          - group: ""
            kind: Secret
            name: gateway-tls-secret
