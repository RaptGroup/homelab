{{- range .Values.applications }}
{{- $config := $.Values.config -}}
{{- $values := .values -}}
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: {{ printf "%s" .name }}
  namespace: argocd
  finalizers:
  - resources-finalizer.argocd.argoproj.io
spec:
  destination:
    namespace: {{ .namespace | default .name | quote }}
    server: {{ $config.spec.destination.server | quote }}
  project: default
  source:
    {{- if and .source (eq .source.type "remote") }}
    repoURL: {{ .source.repoURL }}
    chart: {{ .source.chart }}
    targetRevision: {{ .source.targetRevision }}
    {{- else }}
    path: apps/workloads/{{ .path | default .name }}
    repoURL: {{ $config.spec.source.repoURL }}
    targetRevision: {{ $config.spec.source.targetRevision }}
    {{- end }}
    {{- with .tool }}
    {{- if and . .helm }}
    helm:
      releaseName: {{ .helm.releaseName }}
      {{- if $values }}
      values: |
{{ $values | nindent 8 }}
      {{- end }}
    {{- else }}
    {{- . | toYaml | nindent 4 }}
    {{- end }}
    {{- end }}
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    automated:
      prune: true
      selfHeal: true
---
{{ end -}}
