config:
  spec:
    destination:
      server: https://kubernetes.default.svc
    source:
      repoURL: https://github.com/haljac/homelab
      targetRevision: main
applications:
  - name: metal-lb
    namespace: metallb-system
    tool:
      helm:
        releaseName: metal-lb
  - name: envoy-gateway-system
    namespace: envoy-gateway-system
    source:
      type: remote
      repoURL: oci://docker.io/envoyproxy/gateway-helm
      chart: gateway-helm
      targetRevision: v0.0.0-latest
    tool:
      helm:
        releaseName: eg
  - name: envoy-gateway-config
    namespace: envoy-gateway-system
    tool:
      helm:
        releaseName: envoy-gateway-config
  - name: cert-manager
    namespace: cert-manager
    source:
      type: remote
      repoURL: https://charts.jetstack.io
      chart: cert-manager
      targetRevision: v1.18.2
    tool:
      helm:
        releaseName: cert-manager
    values: |
      installCRDs: true
