# GitHub App credentials for the brazostech scale set, synced from GSM
# into the K8s Secret named in `githubConfigSecret` in helm-values.yaml.
# Same App ID + private key as the personal pool — only the installation
# ID differs (this is the brazostech-org installation).
#
# GSM-side keys:
#   - arc-app-id
#   - arc-app-private-key
#   - arc-installation-id-brazostech
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: arc-runners-brazostech-github-config
  namespace: arc-runners-brazostech
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: gsm
  target:
    name: arc-runners-brazostech-github-config
    creationPolicy: Owner
  data:
    - secretKey: github_app_id
      remoteRef:
        key: arc-app-id
    - secretKey: github_app_installation_id
      remoteRef:
        key: arc-installation-id-brazostech
    - secretKey: github_app_private_key
      remoteRef:
        key: arc-app-private-key
