# Sync the Harbor admin password from GSM into the K8s Secret the
# chart's `existingSecretAdminPassword` references in helm-values.yaml.
#
# GSM secret name:  `harbor-admin-password` (declared as an empty
#   container in terraform/gcp/main.tf).
# Secret key:       `HARBOR_ADMIN_PASSWORD` (the chart's default
#   `existingSecretAdminPasswordKey`).
#
# The container is declared (empty) in terraform/gcp/ alongside every
# other addon credential (grafana-admin-password, adguard-home-admin,
# cloudflare-api-token). The *value* is uploaded out of band by the
# operator — same pattern — so the plaintext password never enters
# Terraform state or Git. Upload command (after `tofu apply` of
# terraform/gcp/):
#
#   echo -n '<harbor-admin-password>' \
#     | gcloud secrets versions add harbor-admin-password \
#         --project rockingham-homelab --data-file=-
#
# The chart's core and exporter Deployments consume this Secret via
# `existingSecretAdminPassword` (set in helm-values.yaml); the JSON-key
# templating the Grafana ExternalSecret uses is not needed here because
# the Harbor container holds a single plaintext string, not a JSON
# object. ESO places that string under the `HARBOR_ADMIN_PASSWORD`
# target key in the K8s Secret, which is the key the chart mounts.
#
# Until the operator uploads a version to the GSM container, ESO
# reports `SecretSyncedError`, the K8s Secret is not created, and the
# Harbor core pod fails to find the credential — Argo reports the app
# `Degraded` rather than silently masking the gap. Same fail-loud
# shape as kube-prometheus-stack/manifests/external-secret-grafana-admin.yaml.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: harbor-admin-password
  namespace: harbor
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: gsm
  # Spell out the ESO admission-webhook defaults
  # (target.deletionPolicy, remoteRef.{conversionStrategy,decodingStrategy,
  # metadataPolicy}) so Argo's strict diff doesn't flag the server-filled
  # fields as drift on every reconcile. Same fix-pattern as every other
  # ExternalSecret in this repo.
  target:
    name: harbor-admin-password
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: HARBOR_ADMIN_PASSWORD
      remoteRef:
        key: harbor-admin-password
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None