# Homepage chart values. Routed addons (those with an HTTPRoute) advertise
# themselves via gethomepage.dev/* annotations on that HTTPRoute — the
# Homepage chart's default ClusterRole already grants list/get on
# httproutes + gateways cluster-wide. Headless addons (no HTTPRoute) can't
# ride that path and are listed longhand under `services:` below — see
# README.md for the routed/headless convention split.
#
# To wire credentials for live-status widgets without putting secrets in
# Git: ExternalSecret resources under manifests/ sync the AdGuard admin
# password and the ArgoCD readonly API token from GSM into the
# homepage-widget-credentials Secret. envFrom below mounts that Secret as
# HOMEPAGE_VAR_* env vars; addon HTTPRoute annotations reference the
# values via {{HOMEPAGE_VAR_…}} substitutions.

enableRbac: true

serviceAccount:
  name: homepage
  create: true

# gethomepage.dev/* annotations documenting the convention by example.
# Homepage's own discovery loop (with config.kubernetes.gateway: true)
# scans HTTPRoutes — see manifests/httproute.yaml for the discovery copy
# of these annotations. They are mirrored here per PRD US 31 so the
# pattern is visible on the primary Service of every addon, not only on
# its routing object.
service:
  main:
    annotations:
      gethomepage.dev/enabled: "true"
      gethomepage.dev/name: Homepage
      gethomepage.dev/description: Cluster dashboard
      gethomepage.dev/group: Platform
      gethomepage.dev/icon: homepage.png
      gethomepage.dev/href: https://dashboard.lab.jackhall.dev

# Default chart ClusterRole already covers ingresses, httproutes, gateways,
# namespaces, pods, nodes, and metrics. Acceptance criterion calls out
# services explicitly — added here so a Service-discovery mode (current or
# future) doesn't need a chart bump to start working.
extraClusterRoles:
  - apiGroups:
      - ""
    resources:
      - services
    verbs:
      - get
      - list

# Gateway API is the only ingress path on this cluster (Cilium gateway).
# No NGINX/Traefik in scope; chart's ingress: section stays disabled.
ingress:
  main:
    enabled: false

env:
  - name: HOMEPAGE_ALLOWED_HOSTS
    value: dashboard.lab.jackhall.dev

envFrom:
  - secretRef:
      name: homepage-widget-credentials

config:
  kubernetes:
    mode: cluster
    ingress: false
    traefik: false
    gateway: true

  # Routed addons are picked up via HTTPRoute annotations (PRD US 14) —
  # do not duplicate those here. This list is reserved for headless
  # addons that have no HTTPRoute to attach annotations to.
  services:
    - CI:
        - RaptGroup runners:
            icon: github.png
            description: Self-hosted ARC pool for github.com/RaptGroup
            href: https://github.com/organizations/RaptGroup/settings/actions/runners
            # ARC runs one ephemeral pod per job in the pool's namespace
            # (the listener lives in arc-systems, not here). Empty
            # pod-selector matches every pod in this namespace, so the
            # status pill counts active runners directly with no GitHub
            # PAT. Scale-to-zero means the namespace is normally empty;
            # Homepage's status endpoint returns 404 in that case, which
            # doubles as the idle-pool signal.
            namespace: arc-runners-raptgroup
            podSelector: ""
        - Brazostech runners:
            icon: github.png
            description: Self-hosted ARC pool for github.com/brazostech
            href: https://github.com/organizations/brazostech/settings/actions/runners
            namespace: arc-runners-brazostech
            podSelector: ""

  bookmarks: []

  # Dashboard-level widgets only (cluster summary + search). Per-service
  # widgets like adguard / argocd attach via HTTPRoute annotations on
  # those addons.
  widgets:
    - kubernetes:
        cluster:
          show: true
          cpu: true
          memory: true
          showLabel: true
          label: rockingham
        nodes:
          show: true
          cpu: true
          memory: true
          showLabel: true
    - search:
        provider: duckduckgo
        target: _blank

  docker: {}

  settingsString: |
    title: Rockingham Homelab
    background:
      image: https://images.unsplash.com/photo-1563863251222-11d3e3bd3b62?auto=format&fit=crop&w=2560&h=1440&q=80
      opacity: 60
    cardBlur: sm
    headerStyle: boxed
    layout:
      Networking:
        style: row
        columns: 4
      Observability:
        style: row
        columns: 4
      Platform:
        style: row
        columns: 4
      CI:
        style: row
        columns: 4
