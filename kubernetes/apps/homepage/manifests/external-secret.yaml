# Live-status widget credentials, synced from GSM via the cluster-wide
# `gsm` ClusterSecretStore. The resulting K8s Secret is mounted as envFrom
# in helm-values.yaml so each value is exposed as HOMEPAGE_VAR_<KEY> and
# referenced from the AdGuard / ArgoCD HTTPRoute annotations as
# {{HOMEPAGE_VAR_…}} substitutions.
#
# GSM-side keys (out of scope for this app, populated by the operator):
#   - homepage-adguard-username
#   - homepage-adguard-password
#   - homepage-argocd-token       (readonly account API key)
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: homepage-widget-credentials
  namespace: homepage
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: gsm
  # See kubernetes/apps/adguard-home/manifests/external-secret.yaml for
  # why these defaults are spelled out — Argo strict-diff drift fix.
  target:
    name: homepage-widget-credentials
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: HOMEPAGE_VAR_ADGUARD_USERNAME
      remoteRef:
        key: homepage-adguard-username
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
    - secretKey: HOMEPAGE_VAR_ADGUARD_PASSWORD
      remoteRef:
        key: homepage-adguard-password
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
    - secretKey: HOMEPAGE_VAR_ARGOCD_TOKEN
      remoteRef:
        key: homepage-argocd-token
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
