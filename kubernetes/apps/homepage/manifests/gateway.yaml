# Cilium Gateway for dashboard.lab.jackhall.dev. Listener terminates TLS
# using the cluster-wide wildcard secret in cert-manager namespace; the
# ReferenceGrant under reference-grant.yaml authorises the cross-namespace
# secret reference (the Gateway API pattern).
#
# LB IP pinned to .203 so the per-host AdGuard rewrite
# `dashboard.lab.jackhall.dev → 192.168.1.203` has a stable target.
# Pool layout: .200 AdGuard DNS, .201 AdGuard UI Gateway,
# .202 Hubble UI Gateway, .203 Homepage Gateway. Without the pin Cilium
# would assign the next free pool address, which makes the AdGuard
# rewrite a moving target across cold restarts.
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: homepage
  namespace: homepage
  annotations:
    lbipam.cilium.io/ips: "192.168.1.203"
spec:
  gatewayClassName: cilium
  listeners:
    - name: https
      protocol: HTTPS
      port: 443
      hostname: dashboard.lab.jackhall.dev
      allowedRoutes:
        namespaces:
          from: Same
      tls:
        mode: Terminate
        certificateRefs:
          - kind: Secret
            group: ""
            name: wildcard-lab-jackhall-dev-tls
            namespace: cert-manager
