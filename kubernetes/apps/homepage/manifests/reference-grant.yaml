# Authorises any Gateway in the homepage namespace to reference the
# wildcard-lab-jackhall-dev-tls Secret living in cert-manager. Required by
# Gateway API for cross-namespace certificateRefs. The same shape will be
# repeated by every addon that needs the wildcard cert until/unless the
# cert is mirrored cluster-wide.
apiVersion: gateway.networking.k8s.io/v1beta1
kind: ReferenceGrant
metadata:
  name: homepage-wildcard-cert
  namespace: cert-manager
spec:
  from:
    - group: gateway.networking.k8s.io
      kind: Gateway
      namespace: homepage
  to:
    - group: ""
      kind: Secret
      name: wildcard-lab-jackhall-dev-tls
