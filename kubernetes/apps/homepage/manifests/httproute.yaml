# HTTPRoute for the dashboard. Annotated with gethomepage.dev/* so the
# Homepage discovery loop renders a card for itself — this is the
# canonical example of the convention every other addon's HTTPRoute will
# follow (PRD US 31).
#
# Attaches cross-namespace to the central `lab` Gateway in gateway-system
# (issue #48); TLS terminates there with the wildcard cert.
#
# Carries a `kubernetes`-type widget so the card shows pod count alongside
# CPU/memory (issue #111). AdGuard and ArgoCD can't get the same widget
# because Homepage only supports one widget per card via K8s annotations
# (resource-helpers.js parses a single `widget.<field>` namespace), and
# those cards already carry their service-specific adguard / argocd
# widgets.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: homepage
  namespace: homepage
  annotations:
    gethomepage.dev/enabled: "true"
    gethomepage.dev/name: Homepage
    gethomepage.dev/description: Cluster dashboard
    gethomepage.dev/group: Platform
    gethomepage.dev/icon: homepage.png
    gethomepage.dev/href: https://dashboard.lab.jackhall.dev
    gethomepage.dev/widget.type: kubernetes
    gethomepage.dev/widget.namespace: homepage
    gethomepage.dev/widget.app: homepage
spec:
  # Spell out the Gateway API admission-webhook defaults (parentRef
  # group/kind, backendRef group/kind/weight, implicit PathPrefix `/`
  # match) so Argo's strict diff doesn't flag the server-filled fields
  # as drift on every reconcile. Same fix as hubble-ui — see #33.
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      namespace: gateway-system
      name: lab
      sectionName: https
  hostnames:
    - dashboard.lab.jackhall.dev
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - group: ""
          kind: Service
          name: homepage
          port: 3000
          weight: 1
