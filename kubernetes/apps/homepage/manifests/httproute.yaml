# HTTPRoute for the dashboard. Annotated with gethomepage.dev/* so the
# Homepage discovery loop renders a card for itself — this is the
# canonical example of the convention every other addon's HTTPRoute will
# follow (PRD US 31).
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: homepage
  namespace: homepage
  annotations:
    gethomepage.dev/enabled: "true"
    gethomepage.dev/name: Homepage
    gethomepage.dev/description: Cluster dashboard
    gethomepage.dev/group: Platform
    gethomepage.dev/icon: homepage.png
    gethomepage.dev/href: https://dashboard.lab.jackhall.dev
spec:
  parentRefs:
    - name: homepage
      namespace: homepage
  hostnames:
    - dashboard.lab.jackhall.dev
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: homepage
          port: 3000
