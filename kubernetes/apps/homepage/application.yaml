# Homepage (gethomepage.dev) — the homelab dashboard at
# dashboard.lab.jackhall.dev.
#
# Multi-source layout (mirrors kubernetes/apps/adguard-home/):
#   - Source 1: jameswynn/homepage chart from upstream Helm repo.
#   - Source 2: $values ref into this repo, so helm-values.yaml lives in
#     Git alongside the Application.
#   - Source 3: the manifests/ directory in this repo, holding raw
#     Gateway / HTTPRoute / ReferenceGrant / ExternalSecret. Argo applies
#     these directly without templating.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: homepage
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  destination:
    server: https://kubernetes.default.svc
    namespace: homepage
  sources:
    - repoURL: https://jameswynn.github.io/helm-charts
      chart: homepage
      targetRevision: 2.1.0
      helm:
        valueFiles:
          - $values/kubernetes/apps/homepage/helm-values.yaml
    - repoURL: git@github.com:RaptGroup/homelab.git
      targetRevision: main
      ref: values
    - repoURL: git@github.com:RaptGroup/homelab.git
      targetRevision: main
      path: kubernetes/apps/homepage/manifests
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
  # The jameswynn/homepage chart sets a `values-checksum` annotation on
  # the Deployment (and its pod template) computed from `print .Values |
  # sha256sum`. Under ArgoCD's render pipeline the hash drifts between
  # reconciles even when helm-values.yaml is unchanged, so every sync
  # patches the annotation and forces a new ReplicaSet — observed as
  # ~3min pod cycling (issue #112). Ignoring this single jsonPointer
  # stops the churn; real values changes still propagate via every other
  # field of the template.
  ignoreDifferences:
    - group: apps
      kind: Deployment
      jsonPointers:
        - /metadata/annotations/values-checksum
        - /spec/template/metadata/annotations/values-checksum
