# Homepage (gethomepage.dev) — the homelab dashboard at
# dashboard.lab.jackhall.dev.
#
# Multi-source layout (mirrors kubernetes/apps/adguard-home/):
#   - Source 1: jameswynn/homepage chart from upstream Helm repo.
#   - Source 2: $values ref into this repo, so helm-values.yaml lives in
#     Git alongside the Application.
#   - Source 3: the manifests/ directory in this repo, holding raw
#     Gateway / HTTPRoute / ReferenceGrant / ExternalSecret. Argo applies
#     these directly without templating.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: homepage
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  destination:
    server: https://kubernetes.default.svc
    namespace: homepage
  sources:
    - repoURL: https://jameswynn.github.io/helm-charts
      chart: homepage
      targetRevision: 2.1.0
      helm:
        valueFiles:
          - $values/kubernetes/apps/homepage/helm-values.yaml
    - repoURL: git@github.com:jvcorredor/homelab.git
      targetRevision: main
      ref: values
    - repoURL: git@github.com:jvcorredor/homelab.git
      targetRevision: main
      path: kubernetes/apps/homepage/manifests
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
