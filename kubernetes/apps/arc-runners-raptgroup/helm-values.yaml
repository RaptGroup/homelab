# gha-runner-scale-set values for the RaptGroup pool — the operator's
# personal-projects org. Backed by the same `Rockingham Homelab ARC`
# GitHub App as the brazostech pool, but a distinct installation.
# Workflows opt in with `runs-on: [self-hosted, raptgroup]`.

githubConfigUrl: https://github.com/RaptGroup

# Variation C — the chart consumes a pre-existing K8s Secret rather than
# baking credentials into values. ESO populates that Secret from GSM
# (see manifests/external-secret.yaml). Rotation is a GSM update; no
# chart change.
githubConfigSecret: arc-runners-raptgroup-github-config

# Pin the runner group explicitly. Default for an unset value is also
# "Default" on the GitHub side, so this is functionally a no-op for
# routing — but it's load-bearing for two reasons:
#
#   1. The scale set's eligibility for any given repo is evaluated by
#      the GitHub broker against the runner group's policy at scale-set
#      registration time, then cached for the broker's routing
#      decisions. After flipping the Default group's
#      `allows_public_repositories` toggle in the GitHub UI / API, the
#      existing registration's cached "no" decision for the public
#      RaptGroup/homelab repo stays sticky until a re-register fires.
#      Adding (or changing) this value bumps the chart's values-hash,
#      which the AutoscalingRunnerSet annotation tracks; the ARC
#      controller then re-creates the listener and the scale set
#      re-registers, picking up the new policy. After that initial
#      use, future runner-group policy changes can be picked up by
#      ArgoCD reconciling a one-line edit here instead of by deleting
#      Pods out of band.
#
#   2. `Default` is intentional. Keeping both pools in the org's
#      default group avoids the per-pool runner-group management
#      surface (visibility, repo allowlist, workflow restrictions) that
#      would otherwise duplicate the GitHub App installation's
#      selected-repo allowlist with no extra security benefit at
#      homelab scale.
runnerGroup: Default

# The chart's helm-template-time controller discovery relies on a
# `lookup`, which Argo's render can't satisfy. Pin the controller SA
# explicitly — the controller chart's fullnameOverride keeps this name
# stable across release renames.
controllerServiceAccount:
  namespace: arc-systems
  name: arc-gha-rs-controller

# `self-hosted` is registered automatically; the items here are appended.
# The full GitHub-side label set is therefore
#   {self-hosted, linux, raptgroup, arc-runners-raptgroup}
# so workflows can target the pool with any of:
#   runs-on: [self-hosted, raptgroup]
#   runs-on: [self-hosted, linux, raptgroup]
#   runs-on: arc-runners-raptgroup
scaleSetLabels:
  - linux
  - raptgroup

# Scale to zero when idle. Cap at 4 concurrent runners — anything more is
# better served by paying for GitHub-hosted runners than by sizing the
# homelab around bursty CI.
minRunners: 0
maxRunners: 4

# No container mode — runners run jobs directly. DinD / Kubernetes
# container mode is intentionally avoided; image builds in CI will move
# to the planned buildkit VM rather than enabling privileged DinD inside
# the cluster. Pods are ephemeral by default in scale-set mode.
template:
  spec:
    containers:
      - name: runner
        image: ghcr.io/actions/actions-runner:latest
        command: ["/home/runner/run.sh"]
        resources:
          requests:
            cpu: 500m
            memory: 1Gi
            ephemeral-storage: 10Gi
