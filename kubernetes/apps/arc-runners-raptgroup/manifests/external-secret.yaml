# GitHub App credentials for the RaptGroup scale set, synced from GSM
# into the K8s Secret named in `githubConfigSecret` in helm-values.yaml.
# Same App ID + private key as the brazostech pool — only the
# installation ID differs (this is the RaptGroup-org installation).
#
# GSM-side keys (TF-managed in terraform/gcp/main.tf):
#   - arc-app-id
#   - arc-app-private-key
#   - arc-installation-id-raptgroup
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: arc-runners-raptgroup-github-config
  namespace: arc-runners-raptgroup
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: gsm
  # See kubernetes/apps/adguard-home/manifests/external-secret.yaml for
  # why these defaults are spelled out — Argo strict-diff drift fix.
  target:
    name: arc-runners-raptgroup-github-config
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: github_app_id
      remoteRef:
        key: arc-app-id
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
    - secretKey: github_app_installation_id
      remoteRef:
        key: arc-installation-id-raptgroup
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
    - secretKey: github_app_private_key
      remoteRef:
        key: arc-app-private-key
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
