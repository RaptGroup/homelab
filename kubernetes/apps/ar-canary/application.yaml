# Canary slice for the preview-environment Artifact Registry repo
# (issues #125 / #139 / ADR-0006). Owns:
#
#   - The `ar-canary` namespace.
#   - A dedicated `ar-canary-puller` ServiceAccount used as the source
#     identity for the cluster→GCP WIF token exchange.
#   - The ESO GCRAccessToken Generator that exchanges a projected
#     `ar-canary-puller` token for a short-lived GCP OAuth access
#     token via Workload Identity Federation — no JSON key anywhere.
#   - The ExternalSecret that wraps the generator output as a
#     `kubernetes.io/dockerconfigjson` Secret named `ar-pull` —
#     the imagePullSecret real workloads reference.
#
# This addon exists as the canary slice referenced in #125's
# cluster-pull acceptance criterion and #139's keyless-WIF closure.
# When the preview-env baseline templates the puller SA + generator
# into every preview namespace, this directory goes away.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ar-canary
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  destination:
    server: https://kubernetes.default.svc
    namespace: ar-canary
  source:
    repoURL: git@github.com:RaptGroup/homelab.git
    targetRevision: main
    path: kubernetes/apps/ar-canary/manifests
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
