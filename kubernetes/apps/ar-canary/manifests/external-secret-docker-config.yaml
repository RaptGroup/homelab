# Wrap the GCRAccessToken generator output as a
# `kubernetes.io/dockerconfigjson` Secret named `ar-pull`. Pods in
# this namespace reference `ar-pull` as their `imagePullSecrets` to
# pull from the `projects` Artifact Registry repo.
#
# Refresh cadence: 30 minutes. GCP OAuth access tokens live ~1 hour;
# refreshing at half-life means the dockerconfigjson in the cluster
# is never closer than 30 minutes to expiry under normal operation.
#
# Registry host follows AR's regional-Docker URL shape:
#   <region>-docker.pkg.dev
# `us-east4-docker.pkg.dev` matches terraform/gcp's
# var.artifact_registry_region. Image paths Pods reference look like:
#   us-east4-docker.pkg.dev/rockingham-homelab/projects/<workload>:<tag>
#
# GCRAccessToken's output keys are `username` (literal
# "oauth2accesstoken") and `password` (the short-lived OAuth access
# token). Reference them straight rather than hardcoding the username
# so the template tracks any future change ESO makes to the login
# convention.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: ar-pull
  namespace: ar-canary
spec:
  refreshInterval: 30m
  target:
    name: ar-pull
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      type: kubernetes.io/dockerconfigjson
      data:
        .dockerconfigjson: |
          {"auths":{"us-east4-docker.pkg.dev":{"username":"{{ .username }}","password":"{{ .password }}","auth":"{{ printf "%s:%s" .username .password | b64enc }}"}}}
  dataFrom:
    - sourceRef:
        generatorRef:
          apiVersion: generators.external-secrets.io/v1alpha1
          kind: GCRAccessToken
          name: ar-pull-token
