# Sync the cluster-pull SA's JSON key from GSM into a K8s Secret that
# the GCRAccessToken generator below reads. The generator exchanges
# the key for a short-lived OAuth token; the key itself never moves
# from this namespace.
#
# GSM secret name: `tf-ci-cluster-pull-key` (TF-managed container in
# terraform/gcp/main.tf, value uploaded out of band — see
# terraform/gcp/README.md for the mint+upload commands).
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: ar-pull-sa-key
  namespace: ar-canary
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: gsm
  # Spell out the ESO admission-webhook defaults
  # (target.deletionPolicy, remoteRef.{conversionStrategy,decodingStrategy,
  # metadataPolicy}) so Argo's strict diff doesn't flag the server-filled
  # fields as drift on every reconcile. Same fix-pattern as the other
  # ExternalSecrets in this repo.
  target:
    name: ar-pull-sa-key
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: credentials.json
      remoteRef:
        key: tf-ci-cluster-pull-key
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
