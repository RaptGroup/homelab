# Dedicated ServiceAccount used as the source identity for the
# cluster→GCP Workload Identity Federation token exchange. ESO mints
# a projected token for this SA (TokenRequest API) with the WIF
# provider's full resource name as `audience`, then exchanges it at
# GCP STS for a federated access token, then impersonates
# tf-ci-cluster-pull. The `principal://…/subject/system:serviceaccount:
# ar-canary:ar-canary-puller` binding in terraform/gcp/main.tf is what
# makes that impersonation succeed.
#
# This SA does not run any Pods itself — it exists solely as the
# identity ESO operates as. Keeping it separate from anything that
# also runs a Pod means a leak of its projected token cannot also be
# used to e.g. mount a workload-shared volume.
#
# The iam.gke.io/gcp-service-account annotation is the well-known
# convention ESO's workloadIdentityFederation auth reads to determine
# which GCP SA to impersonate after the STS exchange. The name is a
# vestige of the GKE pattern but the annotation is consumed by
# non-GKE WIF flows too — see providers/v1/gcp/secretmanager/
# workload_identity_federation.go in upstream ESO.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: ar-canary-puller
  namespace: ar-canary
  annotations:
    iam.gke.io/gcp-service-account: tf-ci-cluster-pull@rockingham-homelab.iam.gserviceaccount.com
