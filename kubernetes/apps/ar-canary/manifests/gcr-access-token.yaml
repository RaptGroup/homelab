# Exchange a projected `ar-canary-puller` ServiceAccount token for a
# short-lived GCP OAuth access token scoped to Artifact Registry, via
# the cluster's own OIDC issuer and a GCP Workload Identity Federation
# pool â€” no JSON key anywhere on the pull path.
#
# Flow:
#
#   1. ESO operator calls kube-apiserver's TokenRequest API for the
#      `ar-canary-puller` SA below, with the JWT's `aud` claim set to
#      the value(s) in `serviceAccountRef.audiences`. kube-apiserver
#      mints a JWT signed by the cluster's SA signing key, with `iss` =
#      the public OIDC issuer URL configured in
#      talos/patches/cluster/oidc-issuer.yaml.
#   2. ESO POSTs the JWT to sts.googleapis.com. GCP STS fetches
#      <issuer>/.well-known/openid-configuration + JWKS from the
#      public GCS bucket (terraform/gcp/) to validate the signature.
#   3. STS returns a federated access token whose subject is the K8s
#      SA's `system:serviceaccount:ar-canary:ar-canary-puller`.
#   4. ESO calls iamcredentials.googleapis.com to impersonate
#      tf-ci-cluster-pull, using the federated token as the caller.
#      The workloadIdentityUser binding in terraform/gcp/main.tf is
#      what authorizes that impersonation.
#   5. ESO returns the impersonated SA's access token (~1h lifetime)
#      to the ExternalSecret in external-secret-docker-config.yaml,
#      which renders it as a dockerconfigjson refreshed every 30 min.
#
# `projectID` is the GCP project ID. `audience` is the WIF provider's
# full resource name â€” `//iam.googleapis.com/projects/<project_number>/...`.
# Project number 594695390705 is the numeric ID of rockingham-homelab;
# the matching `tofu output -raw cluster_wif_provider` in terraform/gcp/
# prints this whole string verbatim.
#
# `serviceAccountRef.audiences` *also* carries the WIF provider's full
# resource name. Two independent legs of the audience check:
#   - The JWT's `aud` claim â€” set by kube-apiserver from this list.
#     Without it, kubelet defaults `aud` to `--api-audiences` (which
#     defaults to the issuer URL), and GCP STS rejects the exchange
#     with "The audience in ID Token [...] does not match the
#     expected audience."
#   - The STS exchange's `audience` parameter â€” the top-level
#     `audience` field above.
# GCP requires both to equal the WIF provider's `name` (unless
# `allowed_audiences` is configured on the provider, which it isn't
# here).
#
# The GCP SA to impersonate after the STS exchange comes from the
# `iam.gke.io/gcp-service-account` annotation on `ar-canary-puller`
# (see serviceaccount.yaml) â€” ESO's workloadIdentityFederation reader
# fetches the SA, reads the annotation, and sets the STS exchange's
# service-account-impersonation-url from it. The newer
# `gcpServiceAccountEmail` field that would set this inline was added
# upstream on 2026-05-13 and is not yet in v1.3.2; revisit on the next
# ESO bump.
apiVersion: generators.external-secrets.io/v1alpha1
kind: GCRAccessToken
metadata:
  name: ar-pull-token
  namespace: ar-canary
spec:
  projectID: rockingham-homelab
  auth:
    workloadIdentityFederation:
      audience: //iam.googleapis.com/projects/594695390705/locations/global/workloadIdentityPools/cluster/providers/talos
      serviceAccountRef:
        name: ar-canary-puller
        namespace: ar-canary
        audiences:
          - //iam.googleapis.com/projects/594695390705/locations/global/workloadIdentityPools/cluster/providers/talos
