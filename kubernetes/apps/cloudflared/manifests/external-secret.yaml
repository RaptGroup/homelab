# Sync the per-tunnel connector token from GSM into a K8s Secret the
# cloudflared Deployment references. The GSM container is owned by
# terraform/gcp/ (kept in lockstep with the addon's ExternalSecret name
# so the cluster-side reference is stable on a fresh project); the
# *value* is written by terraform/cloudflare/ — every apply of the
# cloudflare root that lands a new tunnel or rotates the secret posts
# a new GSM version, and ESO picks it up at the next refresh.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: cloudflared-tunnel-token
  namespace: cloudflared
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: gsm
  # Spell out the ESO admission-webhook defaults so Argo's strict diff
  # doesn't flag the server-filled fields as drift on every reconcile.
  # Same fix-pattern as every other ExternalSecret in this repo.
  target:
    name: cloudflared-tunnel-token
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: token
      remoteRef:
        key: cloudflare-tunnel-token
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
