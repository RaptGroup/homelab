# grafana/alloy values — Alloy slice of the ADR-0007 observability
# stack. Re-read ADR-0007 before touching anything here.
#
# DEPLOYMENT SHAPE
#
#   DaemonSet (`controller.type: daemonset`, the chart default,
#   pinned explicitly): one Alloy pod per node. Each pod tails only
#   the pods scheduled on its own node — the `discovery.kubernetes`
#   field selector below pins discovery to `spec.nodeName`, so the
#   six replicas partition the cluster's logs instead of all six
#   shipping every line. On `rockingham` that is six Ready pods.
#
#   Alloy is configured by a single River program in
#   `alloy.configMap.content`. Two independent pipelines run in it:
#   a log-collection pipeline (pod logs -> Loki) and a no-op OTLP
#   receiver (Phase 3 hook). They share the process but not data.

controller:
  # One pod per node. Explicit even though it is the chart default —
  # #183 and ADR-0007 both call for the DaemonSet shape, and a
  # future chart bump must not silently change it.
  type: daemonset

  # `rockingham` is 3 control-plane + 3 worker nodes; the control-
  # plane nodes carry `node-role.kubernetes.io/control-plane:
  # NoSchedule`. A log collector has to cover all 6 — control-plane
  # logs are exactly what you reach for when the cluster misbehaves
  # (#176 user story 3, #183 acceptance "one Ready pod on every
  # node"). Tolerating every NoSchedule taint matches the node-
  # exporter DaemonSet in this same namespace — the other per-node
  # observability agent.
  tolerations:
    - effect: NoSchedule
      operator: Exists

# Alloy's own River program. `tpl`-rendered by the chart, but this
# config uses no Go-template syntax — `$1` below is River relabel
# capture-group syntax, not a template variable.
alloy:
  # Tail container log files off the host. `mounts.varlog` bind-
  # mounts the node's /var/log (read-only) into the Alloy pod; the
  # kubelet writes CRI log files under /var/log/pods there. This is
  # the file-based collection path — robust across Alloy restarts
  # via on-disk read positions, and it keeps log tailing off the
  # kube-apiserver.
  mounts:
    varlog: true

  # NODE_NAME is the Kubernetes node this pod runs on, injected from
  # spec.nodeName via the downward API. The config below feeds it to
  # the discovery field selector so each DaemonSet pod discovers
  # only its own node's pods.
  extraEnv:
    - name: NODE_NAME
      valueFrom:
        fieldRef:
          fieldPath: spec.nodeName

  # OTLP ingest ports, exposed on the `alloy` Service so workloads
  # can reach alloy.observability.svc:4317 / :4318 cluster-wide.
  # The receiver itself is wired in the River config below; these
  # entries are what publish the ports on the container + Service.
  extraPorts:
    - name: otlp-grpc
      port: 4317
      targetPort: 4317
      protocol: TCP
    - name: otlp-http
      port: 4318
      targetPort: 4318
      protocol: TCP

  configMap:
    content: |-
      // ── Pod log auto-discovery ──────────────────────────────────
      // discovery.kubernetes watches the Kubernetes API for Pods.
      // The field selector pins it to Pods on THIS node: Alloy is a
      // DaemonSet, so without the pin all six pods would discover
      // all six nodes' Pods and ship every log line six times.
      discovery.kubernetes "pods" {
        role = "pod"
        selectors {
          role  = "pod"
          field = "spec.nodeName=" + sys.env("NODE_NAME")
        }
      }

      // discovery.relabel turns Kubernetes metadata into Loki labels
      // and builds the on-disk log path. namespace / pod / container
      // are the labels #183 requires; job (namespace/container) is
      // the conventional Loki stream key. __path__ resolves to the
      // CRI log files the kubelet writes under
      // /var/log/pods/<ns>_<pod>_<uid>/<container>/<n>.log — the
      // replacement expands to /var/log/pods/*<uid>/<container>/*.log
      // because $1 is the "/"-joined uid + container name.
      discovery.relabel "pods" {
        targets = discovery.kubernetes.pods.targets

        rule {
          source_labels = ["__meta_kubernetes_namespace"]
          target_label  = "namespace"
        }
        rule {
          source_labels = ["__meta_kubernetes_pod_name"]
          target_label  = "pod"
        }
        rule {
          source_labels = ["__meta_kubernetes_pod_container_name"]
          target_label  = "container"
        }
        rule {
          source_labels = ["__meta_kubernetes_namespace", "__meta_kubernetes_pod_container_name"]
          separator     = "/"
          target_label  = "job"
        }
        rule {
          source_labels = ["__meta_kubernetes_pod_uid", "__meta_kubernetes_pod_container_name"]
          separator     = "/"
          action        = "replace"
          replacement   = "/var/log/pods/*$1/*.log"
          target_label  = "__path__"
        }
      }

      // local.file_match resolves the __path__ globs to concrete log
      // files; loki.source.file tails them and tracks read positions
      // so an Alloy restart resumes instead of re-shipping.
      local.file_match "pods" {
        path_targets = discovery.relabel.pods.output
      }

      loki.source.file "pods" {
        targets    = local.file_match.pods.targets
        forward_to = [loki.process.pods.receiver]
      }

      // Talos runs containerd, so every node's kubelet writes logs
      // in the CRI envelope ("<ts> <stream> <flags> <message>").
      // stage.cri unwraps it: Loki then stores the bare message and
      // the real log timestamp, not the CRI prefix.
      loki.process "pods" {
        stage.cri {}
        forward_to = [loki.write.loki.receiver]
      }

      // Ship to the single-binary Loki from the #176 tracer-bullet
      // #4 slice. ClusterIP, no auth (Loki runs auth_enabled:false).
      loki.write "loki" {
        endpoint {
          url = "http://loki.observability.svc:3100/loki/api/v1/push"
        }
      }

      // ── OTLP receivers (Phase 3 hook, unrouted today) ───────────
      // gRPC :4317 and HTTP :4318 are open cluster-wide via the
      // Service extraPorts above. They accept OTLP now and drop it
      // at the debug exporter below — a no-op landing pad, so an app
      // can be pointed at alloy.observability.svc:4317 / :4318 today
      // and keep that endpoint when ADR-0007 Phase 3 adds Tempo as
      // the real traces consumer.
      otelcol.receiver.otlp "default" {
        grpc {
          endpoint = "0.0.0.0:4317"
        }
        http {
          endpoint = "0.0.0.0:4318"
        }
        output {
          metrics = [otelcol.exporter.debug.sink.input]
          logs    = [otelcol.exporter.debug.sink.input]
          traces  = [otelcol.exporter.debug.sink.input]
        }
      }

      // The terminal sink for the OTLP receiver. An otelcol receiver
      // only starts its listeners once at least one consumer is
      // wired — empty output lists leave :4317/:4318 closed, which
      // defeats the point of a Phase 3 endpoint hook. The debug
      // exporter is that consumer: it accepts every signal and drops
      // it. verbosity "basic" emits one summary line per batch, and
      // there is no OTLP traffic today, so it stays silent. ADR-0007
      // Phase 3 swaps this for the Tempo exporter; the receiver block
      // above does not change.
      otelcol.exporter.debug "sink" {
        verbosity = "basic"
      }

# Alloy's own metrics flow back to Prometheus via a ServiceMonitor —
# the kube-prometheus-stack slice set wide-open ServiceMonitor
# discovery, so this is scraped with no extra selector wiring.
serviceMonitor:
  enabled: true
