# kube-prometheus-stack values — first slice of the ADR-0007
# observability stack. Re-read ADR-0007 before touching anything in this
# file; the values below encode that decision record directly.
#
# THE NIL-USES-HELM-VALUES TRAP (must outlive any future chart bump)
#
#   By upstream default, the Prometheus Operator treats a *nil* selector
#   on the Prometheus CR as "scope to selectors that match this chart
#   release's Helm labels." A user who writes
#       serviceMonitorSelector: {}
#   alone — expecting "select everything" — instead gets "scope to the
#   chart's release labels only", because the chart's
#   `serviceMonitorSelectorNilUsesHelmValues: true` rewrites an empty
#   selector to a chart-scoped one at template time. This is the
#   "only-chart-labelled-ServiceMonitors-are-discovered" footgun.
#
#   The fix is two-part and BOTH halves must stay set on every chart
#   bump:
#     1. *NilUsesHelmValues flipped to false for serviceMonitor,
#        podMonitor, rule, and probe — so an empty selector means what
#        it literally says.
#     2. Each of the four *Selector keys explicitly set to {} —
#        wide-open discovery across every namespace.
#
#   The *NamespaceSelector keys also set to {} so the operator scans
#   every namespace, not just `observability`. The developer contract
#   from ADR-0007 ("drop a ServiceMonitor next to your Service, no
#   namespace labelling, it just works") fails if any of these six
#   knobs regresses.

alertmanager:
  enabled: true

  # --- Alert routing (ADR-0007, issue #181) --------------------------
  #
  # Two delivery paths, each sourcing its endpoint URL from a file
  # mounted out of an ESO-synced K8s Secret (see alertmanagerSpec.secrets
  # below) — the URLs never appear in this file or in Git:
  #
  #   discord  — the default route. Every actionable alert is grouped by
  #              namespace and POSTed to a Discord channel webhook, so
  #              alerts reach the operator's phone.
  #   watchdog — the chart's always-firing `Watchdog` alert, routed to a
  #              healthchecks.io ping URL on a 1m repeat_interval: the
  #              dead-man's switch. healthchecks.io pages when the pings
  #              STOP, so it survives a fully-dark cluster that a
  #              cluster-internal alert never could. repeat_interval is
  #              pinned at 1m so the only retry knob left to tune is the
  #              healthchecks.io grace period.
  #
  # Supplying `config` replaces the chart's default Alertmanager config
  # wholesale — the `inhibit_rules` below are therefore restated verbatim
  # from that default, or inhibition silently stops working on the first
  # apply. `InfoInhibitor` is the chart's non-actionable helper alert for
  # inhibition; upstream routes it nowhere only because its default
  # receiver is `null`. Now that the default receiver is `discord`, an
  # explicit sub-route drops `InfoInhibitor` into the empty `blackhole`
  # receiver so it does not spam the channel.
  config:
    global:
      resolve_timeout: 5m
    inhibit_rules:
      - source_matchers:
          - 'severity = critical'
        target_matchers:
          - 'severity =~ warning|info'
        equal:
          - 'namespace'
          - 'alertname'
      - source_matchers:
          - 'severity = warning'
        target_matchers:
          - 'severity = info'
        equal:
          - 'namespace'
          - 'alertname'
      - source_matchers:
          - 'alertname = InfoInhibitor'
        target_matchers:
          - 'severity = info'
        equal:
          - 'namespace'
    route:
      group_by: ['namespace']
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 12h
      receiver: discord
      routes:
        # Watchdog is always firing. group_wait 0s makes the first ping
        # immediate on Alertmanager start; repeat_interval 1m lands a
        # ping every minute for as long as the cluster is alive.
        - receiver: watchdog
          matchers:
            - alertname = "Watchdog"
          group_wait: 0s
          group_interval: 1m
          repeat_interval: 1m
        # InfoInhibitor: helper alert, never actionable — drop it.
        - receiver: blackhole
          matchers:
            - alertname = "InfoInhibitor"
    receivers:
      - name: discord
        discord_configs:
          # webhook_url_file resolves against the
          # `discord-alertmanager-webhook` Secret mounted by
          # alertmanagerSpec.secrets below; ESO syncs that Secret from
          # the GSM container of the same name.
          - webhook_url_file: /etc/alertmanager/secrets/discord-alertmanager-webhook/webhook-url
            send_resolved: true
      - name: watchdog
        webhook_configs:
          # url_file resolves against the `healthchecks-watchdog-url`
          # Secret mounted by alertmanagerSpec.secrets below; ESO syncs
          # that Secret from the GSM container of the same name.
          - url_file: /etc/alertmanager/secrets/healthchecks-watchdog-url/url
            send_resolved: false
      # Empty receiver — the explicit blackhole for InfoInhibitor.
      - name: blackhole

  alertmanagerSpec:
    # Alertmanager UI is ClusterIP-only per ADR-0007 ("Prometheus and
    # Alertmanager are ClusterIP-only — raw UIs reachable by kubectl
    # port-forward"); no HTTPRoute, no public surface. Grafana is the
    # only externally-routed surface of this stack.

    # ESO-synced Secrets mounted by the operator at
    # /etc/alertmanager/secrets/<name>/. The `config` above references
    # files inside these mounts via `webhook_url_file` / `url_file`.
    # Until the operator populates the matching GSM containers, ESO does
    # not create these Secrets and the Alertmanager pod stays `Pending`
    # on the missing volumes — fail-loud, the same shape as the Grafana
    # admin credential.
    secrets:
      - discord-alertmanager-webhook
      - healthchecks-watchdog-url
    storage:
      volumeClaimTemplate:
        spec:
          storageClassName: longhorn
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 10Gi

grafana:
  enabled: true

  # Grafana admin password is sourced via ESO from the
  # `grafana-admin-password` GSM container — see
  # manifests/external-secret-grafana-admin.yaml. The K8s Secret
  # `grafana-admin` carries `admin-user` and `admin-password` keys, the
  # default key names this chart's `admin.userKey` / `admin.passwordKey`
  # expect.
  admin:
    existingSecret: grafana-admin
    userKey: admin-user
    passwordKey: admin-password

  # Anonymous viewers enabled per ADR-0007 (Q7 in the PRD). A LAN
  # visitor at https://grafana.lab.jackhall.dev sees dashboards
  # immediately, no login. Editing (creating dashboards, modifying
  # alerts, touching datasources) requires the admin login above.
  grafana.ini:
    auth.anonymous:
      enabled: true
      org_role: Viewer

  # SQLite PVC (the chart's default DB). 10 GB on longhorn — singleton,
  # valuable (dashboards-as-code aside, the operator's drafts live
  # here), must survive node drain. Matches ADR-0007's four-PVC list.
  persistence:
    enabled: true
    type: sts
    storageClassName: longhorn
    accessModes:
      - ReadWriteOnce
    size: 10Gi
    finalizers:
      - kubernetes.io/pvc-protection

  # The Grafana sidecar watches ConfigMaps labelled `grafana_dashboard`
  # across all namespaces and provisions their JSON into Grafana on
  # boot. Repo-owned dashboard JSON lives in
  # kubernetes/apps/kube-prometheus-stack/dashboards/, Kustomize-wrapped
  # into one ConfigMap per dashboard (issue #182).
  #
  # FOLDER CONVENTION (issue #182): `folderAnnotation` names the
  # ConfigMap annotation the sidecar reads to decide which Grafana
  # folder a dashboard belongs in; `provider.foldersFromFilesStructure`
  # turns that into real Grafana folders. The dashboards/ kustomization
  # stamps every repo-owned ConfigMap with `grafana_folder: Homelab`, so
  # repo dashboards land in the read-only "Homelab" folder. ConfigMaps
  # without the annotation (the chart-bundled dashboard library) stay in
  # "General". The writable "Scratch" folder is created by an admin in
  # the Grafana UI and is intentionally absent from Git — see the
  # kube-prometheus-stack README.
  sidecar:
    dashboards:
      enabled: true
      label: grafana_dashboard
      labelValue: "1"
      searchNamespace: ALL
      folderAnnotation: grafana_folder
      provider:
        foldersFromFilesStructure: true
    # The chart's sidecar.datasources block provisions the Prometheus
    # datasource (default, in-cluster) automatically. The Loki
    # datasource is provisioned via additionalDataSources below.
    datasources:
      enabled: true
      defaultDatasourceEnabled: true

  # Loki datasource (#176, tracer-bullet #4). The Loki Application is
  # a sibling slice under kubernetes/apps/loki/; its datasource is
  # wired from here because Grafana lives in this chart. URL is the
  # single-binary Loki Service in the shared `observability`
  # namespace. Grafana Explore lists Loki and accepts LogQL
  # immediately; queries return zero rows until the Alloy slice
  # (#176, tracer-bullet #5) ships log collection — that zero-row
  # state is expected, not a misconfiguration.
  additionalDataSources:
    - name: Loki
      type: loki
      access: proxy
      url: http://loki.observability.svc:3100
      isDefault: false

  # No Ingress — Grafana is reached via the HTTPRoute under
  # manifests/grafana-httproute.yaml attaching to the central `lab`
  # Cilium Gateway (cross-namespace parentRef). Chart default
  # ClusterIP Service type is correct.
  ingress:
    enabled: false

  # gethomepage.dev/* annotations mirrored onto the Grafana Service.
  # Homepage's HTTPRoute discovery (kubernetes.gateway: true) reads the
  # copy on manifests/grafana-httproute.yaml; this duplicate exists per
  # the convention documented in homepage/helm-values.yaml — the pattern
  # is visible on the primary Service of every addon, not only on its
  # routing object. Keep both copies in sync on edits.
  service:
    annotations:
      gethomepage.dev/enabled: "true"
      gethomepage.dev/name: Grafana
      gethomepage.dev/description: Metrics + logs dashboards
      gethomepage.dev/group: Observability
      gethomepage.dev/icon: grafana.svg
      gethomepage.dev/href: https://grafana.lab.jackhall.dev

prometheus:
  enabled: true
  prometheusSpec:
    # Retention per ADR-0007: 30 days of metrics. The 100 GB PVC sizes
    # for this window assuming the addon scrape set plus future
    # audience-B ServiceMonitors; bump the PVC (and document a resize
    # path) if the size becomes binding.
    retention: 30d

    # See the top-of-file comment naming the nil-uses-helm-values
    # trap. All six knobs below must stay set together.
    serviceMonitorSelectorNilUsesHelmValues: false
    serviceMonitorSelector: {}
    serviceMonitorNamespaceSelector: {}
    podMonitorSelectorNilUsesHelmValues: false
    podMonitorSelector: {}
    podMonitorNamespaceSelector: {}
    ruleSelectorNilUsesHelmValues: false
    ruleSelector: {}
    probeSelectorNilUsesHelmValues: false
    probeSelector: {}

    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: longhorn
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 100Gi
