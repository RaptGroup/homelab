# Sync the Grafana admin password from GSM into a K8s Secret that
# helm-values.yaml references via `grafana.admin.existingSecret`.
#
# GSM secret name:        `grafana-admin-password`
# Required keys (JSON):   `admin-user`, `admin-password`
#
# The container is declared (empty) in `terraform/gcp/` alongside
# every other addon credential. The *value* is uploaded out of band
# by the operator — same pattern as `adguard-home-admin` and
# `cloudflare-api-token`, so the plaintext password never enters
# Terraform state or Git. Upload command:
#
#   echo -n '{"admin-user":"admin","admin-password":"<password>"}' \
#     | gcloud secrets versions add grafana-admin-password \
#         --project rockingham-homelab --data-file=-
#
# Grafana reads the Secret on pod boot and uses the credential for
# the admin user; the chart's `admin.userKey` / `admin.passwordKey`
# defaults (`admin-user` / `admin-password`) match the JSON keys
# above, so no `template:` block is needed here.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: grafana-admin
  namespace: observability
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: gsm
  # Spell out the ESO admission-webhook defaults
  # (target.deletionPolicy, remoteRef.{conversionStrategy,decodingStrategy,
  # metadataPolicy}) so Argo's strict diff doesn't flag the server-filled
  # fields as drift on every reconcile. Same fix-pattern as every other
  # ExternalSecret in this repo.
  target:
    name: grafana-admin
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: admin-user
      remoteRef:
        key: grafana-admin-password
        property: admin-user
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
    - secretKey: admin-password
      remoteRef:
        key: grafana-admin-password
        property: admin-password
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
