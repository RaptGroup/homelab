# Sync the Discord webhook URL from GSM into a K8s Secret that
# Alertmanager mounts (via `alertmanager.alertmanagerSpec.secrets` in
# helm-values.yaml) so the `discord` receiver's `webhook_url_file`
# resolves.
#
# GSM secret name:   `discord-alertmanager-webhook`  (plain string, the
#                    whole value is the webhook URL — no JSON, no
#                    `property:` extraction)
# K8s Secret key:    `webhook-url`
# Mounted at:        /etc/alertmanager/secrets/discord-alertmanager-webhook/webhook-url
#
# The container is declared (empty) in `terraform/gcp/` alongside every
# other addon credential; the operator uploads the value out of band —
# same pattern as `grafana-admin-password` and `cloudflare-api-token`,
# so the webhook URL never enters Terraform state or Git. Until that
# upload happens this ExternalSecret reports `SecretSyncedError`, the
# `discord-alertmanager-webhook` Secret is not created, and the
# Alertmanager pod stays `Pending` on the missing secret volume — the
# same fail-loud shape as the Grafana admin credential.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: discord-alertmanager-webhook
  namespace: observability
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: gsm
  # Spell out the ESO admission-webhook defaults
  # (target.deletionPolicy, remoteRef.{conversionStrategy,decodingStrategy,
  # metadataPolicy}) so Argo's strict diff doesn't flag the server-filled
  # fields as drift on every reconcile. Same fix-pattern as every other
  # ExternalSecret in this repo.
  target:
    name: discord-alertmanager-webhook
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: webhook-url
      remoteRef:
        key: discord-alertmanager-webhook
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
