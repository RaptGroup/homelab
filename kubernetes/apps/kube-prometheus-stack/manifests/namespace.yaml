# The `observability` namespace is the shared home for all three
# Argo Applications in the ADR-0007 stack — kube-prometheus-stack
# (this slice), loki, and alloy (later slices). It is declared here,
# in the first slice to land, so the later two Applications can
# attach to an existing namespace without owning a duplicate
# manifest.
#
# Pod Security Admission is set to `privileged`. The
# kube-prometheus-stack chart bundles node-exporter as a DaemonSet
# that intrinsically needs `hostNetwork=true`, `hostPID=true`,
# `hostPort: 9100`, and hostPath mounts of `/`, `/proc`, `/sys` —
# none of which are reachable under the `baseline` or `restricted`
# PSA profiles. Grafana's chart-shipped `init-chown-data` init
# container additionally runs as `runAsUser=0` with the `CHOWN`
# capability to fix volume ownership on the SQLite PVC. Both
# shipped behaviours are upstream defaults, not local choices to
# harden away here; the stricter profile would force the chart's
# securityContext into a non-default shape on every chart bump.
#
# Same rationale (and same `privileged` label) as `longhorn-system`
# and `local-path-storage`: storage and host-instrumentation layers
# sit outside the restricted-by-default PSA posture, and this stack's
# host-binding components join that category. The original
# `restricted` label here was a bug — it admission-blocked
# node-exporter and Grafana the moment the first PVC was actually
# requested in this namespace; this manifest is the fix.
#
# `warn` and `audit` also set to `privileged` so a future
# cluster-wide tightening surfaces this namespace explicitly in
# audit logs rather than silently downgrading the enforcement.
apiVersion: v1
kind: Namespace
metadata:
  name: observability
  labels:
    pod-security.kubernetes.io/enforce: privileged
    pod-security.kubernetes.io/warn: privileged
    pod-security.kubernetes.io/audit: privileged
