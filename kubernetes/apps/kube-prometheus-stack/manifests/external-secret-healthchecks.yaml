# Sync the healthchecks.io ping URL from GSM into a K8s Secret that
# Alertmanager mounts (via `alertmanager.alertmanagerSpec.secrets` in
# helm-values.yaml) so the `watchdog` receiver's `url_file` resolves.
#
# GSM secret name:   `healthchecks-watchdog-url`  (plain string, the
#                    whole value is the ping URL — no JSON, no
#                    `property:` extraction)
# K8s Secret key:    `url`
# Mounted at:        /etc/alertmanager/secrets/healthchecks-watchdog-url/url
#
# This URL is the dead-man's switch: the chart's always-firing
# `Watchdog` alert POSTs to it every minute. If Prometheus,
# Alertmanager, the node, or the ISP dies, the pings stop and
# healthchecks.io pages — surviving a fully-dark cluster, which a
# cluster-internal alert never could.
#
# The container is declared (empty) in `terraform/gcp/`; the operator
# uploads the value out of band — same pattern as
# `grafana-admin-password`, so the URL never enters Terraform state or
# Git. Until that upload happens this ExternalSecret reports
# `SecretSyncedError`, the `healthchecks-watchdog-url` Secret is not
# created, and the Alertmanager pod stays `Pending` on the missing
# secret volume — the same fail-loud shape as the Grafana admin
# credential.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: healthchecks-watchdog-url
  namespace: observability
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: gsm
  # Spell out the ESO admission-webhook defaults
  # (target.deletionPolicy, remoteRef.{conversionStrategy,decodingStrategy,
  # metadataPolicy}) so Argo's strict diff doesn't flag the server-filled
  # fields as drift on every reconcile. Same fix-pattern as every other
  # ExternalSecret in this repo.
  target:
    name: healthchecks-watchdog-url
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: url
      remoteRef:
        key: healthchecks-watchdog-url
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
