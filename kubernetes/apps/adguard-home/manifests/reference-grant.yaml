# Authorizes the adguard-home Gateway to reference the cluster-wide
# wildcard cert Secret in the cert-manager namespace. Same pattern as
# kubernetes/apps/hubble-ui/manifests/referencegrant-cert.yaml — the
# wildcard cert is per-cluster (one Certificate, one Secret) and every
# Gateway that terminates TLS for `*.lab.jackhall.dev` references it
# through a grant like this. Lives in the *target* namespace.
apiVersion: gateway.networking.k8s.io/v1beta1
kind: ReferenceGrant
metadata:
  name: adguard-home-wildcard-cert
  namespace: cert-manager
spec:
  from:
    - group: gateway.networking.k8s.io
      kind: Gateway
      namespace: adguard-home
  to:
    - group: ""
      kind: Secret
      name: wildcard-lab-jackhall-dev-tls
