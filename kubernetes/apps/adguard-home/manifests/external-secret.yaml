# Sync the AdGuard Home admin user/password from GSM into a K8s Secret
# the seed-config init container reads.
#
# GSM secret name:        `adguard-home-admin`
# Required keys (JSON):   `username`, `password_hash`
#
# `password_hash` is a bcrypt hash, *not* the plaintext. Generate locally
# (one-time) with:
#
#   htpasswd -nbB admin '<password>' | cut -d: -f2
#
# then upload the JSON object to GSM via:
#
#   echo '{"username":"admin","password_hash":"<hash>"}' \
#     | gcloud secrets versions add adguard-home-admin \
#         --project rockingham-homelab --data-file=-
#
# AdGuard Home reads the bcrypt hash directly from AdGuardHome.yaml,
# so the plaintext password never lives in Git, in the cluster, or in
# Terraform state.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: adguard-home-admin
  namespace: adguard-home
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: gsm
  target:
    name: adguard-home-admin
    creationPolicy: Owner
  data:
    - secretKey: username
      remoteRef:
        key: adguard-home-admin
        property: username
    - secretKey: password_hash
      remoteRef:
        key: adguard-home-admin
        property: password_hash
