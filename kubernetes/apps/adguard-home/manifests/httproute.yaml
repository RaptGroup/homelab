# adguard.lab.jackhall.dev → AdGuard Home admin UI (chart-rendered
# Service `adguard-home` in this namespace). TLS terminates at the
# parent Gateway with the wildcard cert; the hop into the pod is
# plaintext on port 80 (same model the bootstrap uses for argocd).
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: adguard-home-ui
  namespace: adguard-home
spec:
  # The Gateway API admission webhook defaults parentRef group/kind, the
  # backendRef weight, and the implicit "PathPrefix /" match block when
  # they're omitted. Argo with strict comparison flags those server-side
  # additions as drift, so spell them out here verbatim — same pattern
  # as kubernetes/apps/hubble-ui/manifests/httproute.yaml.
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: adguard-home
      sectionName: https
  hostnames:
    - adguard.lab.jackhall.dev
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - group: ""
          kind: Service
          name: adguard-home
          port: 80
          weight: 1
