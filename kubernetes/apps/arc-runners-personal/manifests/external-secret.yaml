# GitHub App credentials for the personal scale set, synced from GSM into
# the K8s Secret named in `githubConfigSecret` in helm-values.yaml. The
# chart looks up that Secret at runtime — keys are dictated by the chart
# (Variation B layout: `github_app_id`, `github_app_installation_id`,
# `github_app_private_key`).
#
# GSM-side keys (out of scope for this app, populated out-of-band by the
# operator at App-creation time):
#   - arc-app-id
#   - arc-app-private-key
#   - arc-installation-id-jvcorredor
#
# The same App ID + private key are reused by the brazostech scale set
# (one App, two installations). Only the installation ID differs between
# scopes — that's the access boundary.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: arc-runners-personal-github-config
  namespace: arc-runners-personal
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: gsm
  target:
    name: arc-runners-personal-github-config
    creationPolicy: Owner
  data:
    - secretKey: github_app_id
      remoteRef:
        key: arc-app-id
    - secretKey: github_app_installation_id
      remoteRef:
        key: arc-installation-id-jvcorredor
    - secretKey: github_app_private_key
      remoteRef:
        key: arc-app-private-key
