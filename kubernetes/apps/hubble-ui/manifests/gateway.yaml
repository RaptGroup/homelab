# LB IP pinned to .202 so AdGuard Home's DNS Service (PRD #4 / #28
# architecturally reserves .200) and AdGuard's admin-UI Gateway (.201)
# can claim their addresses without competing with Hubble for the
# first-free slot in the .200–.230 pool. Hubble was the first addon
# to land and grabbed .200 by default — that broke AdGuard's `lbipam.
# cilium.io/ips: 192.168.1.200` annotation when AdGuard followed.
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: hubble-ui
  namespace: hubble-ui
  annotations:
    lbipam.cilium.io/ips: "192.168.1.202"
spec:
  gatewayClassName: cilium
  listeners:
    - name: https
      hostname: hubble.lab.jackhall.dev
      port: 443
      protocol: HTTPS
      tls:
        mode: Terminate
        certificateRefs:
          - kind: Secret
            group: ""
            namespace: cert-manager
            name: wildcard-lab-jackhall-dev-tls
      allowedRoutes:
        namespaces:
          from: Same
