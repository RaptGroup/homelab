# Hubble UI Service is owned by the Cilium Helm release in kube-system, so
# Homepage auto-discovery annotations live on the HTTPRoute we own here
# (Homepage supports gethomepage.dev/* on HttpRoute when its kubernetes
# config has `gateway: true`).
#
# Attaches cross-namespace to the central `lab` Gateway in gateway-system
# (issue #48); TLS terminates there with the wildcard cert.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: hubble-ui
  namespace: hubble-ui
  annotations:
    gethomepage.dev/enabled: "true"
    gethomepage.dev/name: Hubble
    gethomepage.dev/group: Observability
    gethomepage.dev/icon: cilium.png
    gethomepage.dev/description: Cilium network flow visualizer
    gethomepage.dev/href: https://hubble.lab.jackhall.dev
    # No status-discovery override. The Hubble UI Deployment ships with
    # Cilium in kube-system, not in the hubble-ui namespace where this
    # repo owns the routing layer. Homepage v1.2.0 silently ignores
    # `gethomepage.dev/namespace` on HTTPRoutes (the annotation is only
    # honored on Ingress objects), so the cross-namespace pod lookup
    # cannot be expressed here. Card renders as a plain link without a
    # live status pill — accepted in lieu of restructuring the repo to
    # satisfy Homepage's HTTPRoute discovery limitations.
spec:
  # The Gateway API admission webhook defaults parentRef group/kind, the
  # backendRef weight, and the implicit "PathPrefix /" match block when
  # they're omitted. Argo with strict comparison flags those server-side
  # additions as drift, so spell them out here verbatim — the file is then
  # what the API server actually stores.
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      namespace: gateway-system
      name: lab
      sectionName: https
  hostnames:
    - hubble.lab.jackhall.dev
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - group: ""
          kind: Service
          name: hubble-ui
          namespace: kube-system
          port: 80
          weight: 1
