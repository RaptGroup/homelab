# Allows the hubble-ui HTTPRoute to target the Hubble UI Service the Cilium
# Helm release creates in kube-system.
apiVersion: gateway.networking.k8s.io/v1beta1
kind: ReferenceGrant
metadata:
  name: hubble-ui-backend
  namespace: kube-system
spec:
  from:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      namespace: hubble-ui
  to:
    - group: ""
      kind: Service
      name: hubble-ui
