# Allows the hubble-ui Gateway to reference the cluster-wide wildcard cert
# Secret in the cert-manager namespace (the cross-namespace TLS pattern
# documented in terraform/bootstrap/outputs.tf).
apiVersion: gateway.networking.k8s.io/v1beta1
kind: ReferenceGrant
metadata:
  name: hubble-ui-wildcard-cert
  namespace: cert-manager
spec:
  from:
    - group: gateway.networking.k8s.io
      kind: Gateway
      namespace: hubble-ui
  to:
    - group: ""
      kind: Secret
      name: wildcard-lab-jackhall-dev-tls
