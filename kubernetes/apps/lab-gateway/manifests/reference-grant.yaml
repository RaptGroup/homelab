# Authorises the central `lab` Gateway in gateway-system to reference
# the cluster-wide wildcard cert Secret in the cert-manager namespace.
# Replaces the per-addon `*-wildcard-cert` grants — one Gateway, one
# grant, instead of one per addon namespace.
apiVersion: gateway.networking.k8s.io/v1beta1
kind: ReferenceGrant
metadata:
  name: lab-gateway-wildcard-cert
  namespace: cert-manager
spec:
  from:
    - group: gateway.networking.k8s.io
      kind: Gateway
      namespace: gateway-system
  to:
    - group: ""
      kind: Secret
      name: wildcard-lab-jackhall-dev-tls
