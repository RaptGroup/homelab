apiVersion: batch/v1
kind: CronJob
metadata:
  name: preview-env-reaper
  namespace: projects-system
spec:
  # Hourly is fine — the wrapper is the source of truth and runs the
  # delete synchronously on PR close / `just preview-down`. The
  # reaper is the orphan backstop, not the primary teardown path.
  schedule: "0 * * * *"
  timeZone: Etc/UTC
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  startingDeadlineSeconds: 600
  jobTemplate:
    spec:
      backoffLimit: 2
      ttlSecondsAfterFinished: 86400
      template:
        spec:
          serviceAccountName: preview-env-reaper
          restartPolicy: OnFailure
          securityContext:
            runAsNonRoot: true
            runAsUser: 65532
            runAsGroup: 65532
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: reaper
              image: docker.io/bitnamilegacy/kubectl:1.33.4
              imagePullPolicy: IfNotPresent
              command: ["/bin/sh", "/scripts/reap.sh"]
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities:
                  drop: ["ALL"]
              resources:
                requests:
                  cpu: 10m
                  memory: 32Mi
                limits:
                  cpu: 200m
                  memory: 128Mi
              volumeMounts:
                - name: script
                  mountPath: /scripts
                  readOnly: true
          volumes:
            - name: script
              configMap:
                name: preview-env-reaper-script
