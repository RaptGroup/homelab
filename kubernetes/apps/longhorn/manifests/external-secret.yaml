# Sync the Longhorn S3-interop HMAC pair from GSM into a K8s Secret that
# Longhorn references via `defaultBackupStore.backupTargetCredentialSecret`.
#
# GSM secret name:        `longhorn-backup-credentials`
# Required keys (JSON):   `access_id`, `secret`
#
# `access_id` and `secret` come from `gcloud storage hmac create` against
# the `longhorn-backup` SA; the HMAC pair authenticates Longhorn to the
# GCS S3-interop endpoint. See terraform/gcp/README.md for the mint +
# upload commands.
#
# The materialized K8s Secret carries four keys, not two. Longhorn's
# backup-target reader looks for `AWS_ACCESS_KEY_ID` / `AWS_SECRET_ACCESS_KEY`
# / `AWS_ENDPOINTS` (case-sensitive) and respects `VIRTUAL_HOSTED_STYLE`
# when set — GCS only accepts virtual-hosted-style requests on the
# interop endpoint, so a path-style default would 400. The endpoint and
# style are static and templated here rather than stored in GSM, so a
# credential rotation never has to touch this manifest.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: longhorn-backup-credentials
  namespace: longhorn-system
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: gsm
  # Spell out the ESO admission-webhook defaults
  # (target.deletionPolicy, remoteRef.{conversionStrategy,decodingStrategy,
  # metadataPolicy}) so Argo's strict diff doesn't flag the server-filled
  # fields as drift on every reconcile. Same fix-pattern as every other
  # ExternalSecret in this repo.
  target:
    name: longhorn-backup-credentials
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      type: Opaque
      data:
        AWS_ACCESS_KEY_ID: "{{ .access_id }}"
        AWS_SECRET_ACCESS_KEY: "{{ .secret }}"
        AWS_ENDPOINTS: https://storage.googleapis.com
        VIRTUAL_HOSTED_STYLE: "true"
  data:
    - secretKey: access_id
      remoteRef:
        key: longhorn-backup-credentials
        property: access_id
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
    - secretKey: secret
      remoteRef:
        key: longhorn-backup-credentials
        property: secret
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
