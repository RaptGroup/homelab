# Argo CD Helm values — read by terraform/bootstrap (initial install) and
# by the self-managed argocd Application (every reconcile thereafter).
# Changes here flow into the cluster automatically once Argo is healthy.

global:
  # Used by argocd-server's redirect logic and by the documented
  # Gateway/HTTPRoute (lives under kubernetes/apps/argocd/, not here).
  domain: argocd.lab.jackhall.dev

configs:
  params:
    # TLS terminates at the Gateway, not at argocd-server. Keeps the
    # internal hop plaintext and avoids cert plumbing inside the pod.
    server.insecure: true

  cm:
    # Lets Application manifests reference plain http/https git URLs
    # (the homelab convention; SSH only when private repos arrive).
    timeout.reconciliation: 180s

    # Local account consumed by the Homepage dashboard's ArgoCD widget
    # (kubernetes/apps/homepage/). `apiKey` (not `login`) lets the account
    # mint API tokens but not log in to the UI, so a leaked token is
    # bounded to API reads only.
    accounts.homepage: apiKey
    accounts.homepage.enabled: "true"

  rbac:
    # `role:readonly` is the chart's built-in role granting `get` on every
    # resource cluster-wide — exactly what the Homepage widget needs and
    # structurally incapable of mutating state.
    policy.csv: |
      g, homepage, role:readonly
